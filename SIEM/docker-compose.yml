# ============================================================
# Smart SIEM - docker-compose.yml
# ============================================================
# Orchestration des services Docker
#
# Services :
#   api          : Application FastAPI (backend principal)
#   worker       : Worker Celery pour le traitement asynchrone
#   beat         : Planificateur Celery Beat
#   flower       : Interface de monitoring Celery (port 5555)
#   elasticsearch: Moteur de recherche et stockage (port 9200)
#   kibana       : Visualisation Elasticsearch (port 5601)
#   redis        : Cache et file d'attente (port 6379)
#   logstash     : Pipeline de collecte et transformation de logs
#   nginx        : Reverse proxy sécurisé (ports 80, 443)
#
# Volumes :
#   elasticsearch_data:
#   redis_data:
#
# Réseau :
#   siem-network (driver: bridge)
