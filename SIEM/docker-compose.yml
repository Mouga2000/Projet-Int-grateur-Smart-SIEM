# ============================================================
# Smart SIEM - docker-compose.yml
# ============================================================
# Contient : Elasticsearch + Kibana + API Smart SIEM
# PostgreSQL doit encore tourner sur l'hôte (hors Docker)

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: siem-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: siem-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siem-api
    env_file: .env
    environment:
      - ELASTICSEARCH_HOST=elasticsearch
      - DATABASE_URL=postgresql+asyncpg://postgres:0901@host.docker.internal:5432/SmartSiem
      - DATABASE_SYNC_URL=postgresql+psycopg2://postgres:0901@host.docker.internal:5432/SmartSiem
    ports:
      - "8000:8000"
    depends_on:
      elasticsearch:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  es_data:
