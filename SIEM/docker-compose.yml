# ============================================================
# Smart SIEM - docker-compose.yml
# ============================================================
# Services Docker :
#   kibana : Visualisation Elasticsearch (port 5601)
#
# Note : Elasticsearch est deja lance sur Docker Desktop (port 9200).
#        Kibana se connecte via host.docker.internal.

services:
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: siem-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://host.docker.internal:9200
    ports:
      - "5601:5601"
    networks:
      - siem-network

networks:
  siem-network:
    driver: bridge
