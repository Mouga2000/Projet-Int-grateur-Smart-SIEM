# ============================================================
# Smart SIEM - docker-compose.yml
# ============================================================
# Seul l'API est dockerisée.
# PostgreSQL, Elasticsearch et Kibana tournent en local (hôte).
# L'API accède aux services hôte via host.docker.internal.

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siem-api
    env_file: .env
    environment:
      # Surcharge pour que le conteneur accède aux services sur la machine hôte
      - ELASTICSEARCH_HOST=host.docker.internal
      - DATABASE_URL=postgresql+asyncpg://postgres:0901@host.docker.internal:5432/SmartSiem
      - DATABASE_SYNC_URL=postgresql+psycopg2://postgres:0901@host.docker.internal:5432/SmartSiem
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
