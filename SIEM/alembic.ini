# Alembic configuration file
# -------------------------------
# Ce que tu dois mettre ici :
#
# [alembic]
#   script_location = migrations
#   sqlalchemy.url = driver://user:pass@localhost/dbname
#
#   # Version locs (chemin vers les fichiers de migration)
#   version_locs = migrations/versions
#
#   # Logging
#   [loggers]
#   keys = root,sqlalchemy,alembic
#
#   [handlers]
#   keys = console
#
#   [formatters]
#   keys = generic
#
#   [logger_root]
#   level = WARN
#   handlers = console
#
#   [logger_sqlalchemy]
#   level = WARN
#
#   [logger_alembic]
#   level = INFO
#   handlers =
#   qualname = alembic
#
#   [handler_console]
#   class = StreamHandler
#   args = (sys.stderr,)
#   level = NOTSET
#   formatter = generic
#
#   [formatter_generic]
#   format = %(levelname)-5.5s [%(name)s] %(message)s
#   datefmt = %H:%M:%S
#
# --- Version alternative avec template ---
# Tu peux générer ce fichier automatiquement avec :
#   alembic init migrations
# Puis modifier sqlalchemy.url pour utiliser ta config pydantic-settings
