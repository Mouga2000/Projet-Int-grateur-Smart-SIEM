# ============================================================
# Smart SIEM - Frontend Nginx Configuration
# ============================================================
# Serveur optimisé pour une SPA React/Vite
# ============================================================

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Support du routing SPA (fallback vers index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressif pour les assets buildés (hashés)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Ne pas cache l'index.html (toujours servir la dernière version)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # Sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
